<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

<title>Add Expense - Núcleo Parental Pro</title>

                        "tertiary-fixed-dim": "#04aef2",
                        "on-tertiary-fixed-variant": "#003e59",

<style>
        body { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 0px; }
        .glass-panel {
            background: rgba(14, 14, 14, 0.6);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-surface custom-scrollbar">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 w-full z-50 bg-[#0e0e0e]/60 backdrop-blur-md flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#7fe6db]">arrow_back</span>
<h1 class="font-manrope tracking-tight font-bold text-on-surface text-xl">New Expense</h1>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant">more_vert</span>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-lg mx-auto">
<!-- Content Focus -->
<div class="flex flex-col gap-8">
<!-- Amount Input Section -->
<section class="flex flex-col items-center">
<label class="text-xs font-manrope font-semibold tracking-wide uppercase text-on-surface-variant mb-4">Amount</label>
<div class="flex items-center gap-2">
<span class="text-4xl font-headline font-extrabold text-primary">€</span>
<input class="w-40 bg-transparent text-5xl font-headline font-extrabold text-on-surface border-none focus:ring-0 placeholder:text-surface-container-high text-center" placeholder="0.00" step="0.01" type="number"/>
</div>
</section>
<!-- Form Content -->
<form class="space-y-6">
<!-- Category Grid -->
<div class="space-y-3">
<label class="block text-[11px] font-manrope font-semibold tracking-wide uppercase text-on-surface-variant px-1">Category</label>
<div class="grid grid-cols-4 gap-3">
<button class="flex flex-col items-center gap-2 p-3 rounded-xl bg-primary-container/10 border border-primary/20 transition-all" type="button">
<span class="material-symbols-outlined text-primary" data-icon="school">school</span>
<span class="text-[10px] font-bold text-primary">Education</span>
</button>
<button class="flex flex-col items-center gap-2 p-3 rounded-xl bg-surface-container hover:bg-surface-container-high transition-all" type="button">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="medical_services">medical_services</span>
<span class="text-[10px] font-bold text-on-surface-variant">Health</span>
</button>
<button class="flex flex-col items-center gap-2 p-3 rounded-xl bg-surface-container hover:bg-surface-container-high transition-all" type="button">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="restaurant">restaurant</span>
<span class="text-[10px] font-bold text-on-surface-variant">Food</span>
</button>
<button class="flex flex-col items-center gap-2 p-3 rounded-xl bg-surface-container hover:bg-surface-container-high transition-all" type="button">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="styler">styler</span>
<span class="text-[10px] font-bold text-on-surface-variant">Other</span>
</button>
</div>
</div>
<!-- Description Input -->
<div class="space-y-2">
<label class="block text-[11px] font-manrope font-semibold tracking-wide uppercase text-on-surface-variant px-1">Description</label>
<div class="bg-surface-container-lowest rounded-xl px-4 py-1 border border-transparent focus-within:border-primary/40 transition-all shadow-inner">
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface py-3 text-sm placeholder:text-on-surface-variant/40" placeholder="What was this for?" type="text"/>
</div>
</div>
<!-- Payer Selection (Parent A/B) -->
<div class="space-y-3">
<label class="block text-[11px] font-manrope font-semibold tracking-wide uppercase text-on-surface-variant px-1">Who Paid?</label>
<div class="flex gap-4">
<button class="flex-1 flex items-center justify-center gap-3 p-4 rounded-xl bg-surface-container-high border-2 border-primary transition-all" type="button">
<div class="w-8 h-8 rounded-full overflow-hidden">
<img alt="" class="w-full h-full object-cover" data-alt="professional portrait of a middle-aged man with short hair and a warm smile in soft studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAPK5MxcJu5S2ipsGvGSwnCZAAERCVD0iKiB0SDRUQlgWKlNaBhK2mYk0EEGILsbtUbpMtN7YbbPbnP4_2yr2--I0qQoQN6qCBGF3372FBLTn7OwIi3wyNv2MT6sxcf3PGFLU0zhLR0tJsuum24zridjqtTorDXp5DKhLgDtPoT28rKMTq7ut_jGtSTl8SSYZGFGlXFLS0oL7mUhRZrpLCRTiceubvV4mnHk0fL7DOjNFQPOYu3BXa1NBnarKcHREMdMx_E69hESg"/>
</div>
<span class="text-sm font-bold text-on-surface">Parent A</span>
</button>
<button class="flex-1 flex items-center justify-center gap-3 p-4 rounded-xl bg-surface-container transition-all opacity-60" type="button">
<div class="w-8 h-8 rounded-full overflow-hidden grayscale">
<img alt="" class="w-full h-full object-cover" data-alt="professional portrait of a smiling woman with glasses and wavy dark hair against a soft neutral background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCc8DRu9dcPVvSRgYIfxMwaeou4ygnLl9w3C-3asoWN0gU7YRKFxWUzFN1JpwgE0wy6dWAvV6pjXUJ9VoI80RZWv3Kp4XFZTiInJa0og3AxHwiuM5S2Zf4TYViAdemlgdRjq3jclNHoW6NcT2KcnZJjRJkG2AQS-p_k3VddaBZ7ztPN6bp0Cp2hJfcVY8itzZaPanzSMlMb8yL8hNXftKJiyN2ozds3HblF0Hao1cm5pvxlZ-tbLtFCyCG0cvoKjo1HMfCGdYm-Dg"/>
</div>
<span class="text-sm font-bold text-on-surface-variant">Parent B</span>
</button>
</div>
</div>
<!-- Split Ratio Card -->
<div class="bg-surface-container p-5 rounded-2xl space-y-4">
<div class="flex justify-between items-center">
<label class="block text-[11px] font-manrope font-semibold tracking-wide uppercase text-on-surface-variant">Split Ratio</label>
<span class="text-xs font-bold text-primary">50% / 50%</span>
</div>
<div class="relative py-2">
<div class="h-2 w-full bg-surface-container-lowest rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary to-primary-container w-1/2"></div>
</div>
<div class="absolute top-1/2 left-1/2 -translate-y-1/2 -translate-x-1/2 w-6 h-6 bg-on-surface rounded-full shadow-lg border-2 border-primary"></div>
</div>
<div class="flex justify-between text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-tighter">
<span>Parent A: €0.00</span>
<span>Parent B: €0.00</span>
</div>
</div>
<!-- Submit CTA -->
<div class="pt-4">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-extrabold py-4 rounded-xl text-lg shadow-[0_8px_30px_rgb(127,230,219,0.2)] active:scale-95 transition-all" type="button">
                        Save Expense
                    </button>
</div>
</form>
</div>
</main>
<!-- Bottom Navigation Mock (suppressed/filtered version for focus page) -->
<footer class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-[#1a1a1a]/80 backdrop-blur-xl z-50 rounded-t-2xl shadow-[0_-4px_20px_rgba(0,0,0,0.5)]">
<div class="flex flex-col items-center justify-center text-[#adaaaa] opacity-70 px-4 py-1.5 transition-transform active:scale-90">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="text-[11px] font-manrope font-semibold tracking-wide uppercase">Dashboard</span>
</div>
<div class="flex flex-col items-center justify-center text-[#adaaaa] opacity-70 px-4 py-1.5 transition-transform active:scale-90">
<span class="material-symbols-outlined" data-icon="chat_bubble">chat_bubble</span>
<span class="text-[11px] font-manrope font-semibold tracking-wide uppercase">Chat</span>
</div>
<div class="flex flex-col items-center justify-center text-[#adaaaa] opacity-70 px-4 py-1.5 transition-transform active:scale-90">
<span class="material-symbols-outlined" data-icon="calendar_today">calendar_today</span>
<span class="text-[11px] font-manrope font-semibold tracking-wide uppercase">Calendar</span>
</div>
<div class="flex flex-col items-center justify-center bg-[#20201f] text-[#7fe6db] rounded-xl px-4 py-1.5 transition-transform active:scale-90">
<span class="material-symbols-outlined" data-icon="payments" style="font-variation-settings: 'FILL' 1;">payments</span>
<span class="text-[11px] font-manrope font-semibold tracking-wide uppercase">Finances</span>
</div>
</footer>
</body></html>
